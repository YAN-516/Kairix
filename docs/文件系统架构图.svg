<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L8,5 L1,9" fill="none" stroke="#24313f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .page { fill: #ffffff; }
      .outer { fill: none; stroke: #d7dde5; stroke-width: 2; }
      .box { stroke: #24313f; stroke-width: 2; }
      .subbox { stroke: #24313f; stroke-width: 1.35; }
      .dash { stroke: #24313f; stroke-width: 1.8; stroke-dasharray: 8 7; }
      .arrow { stroke: #24313f; stroke-width: 1.9; fill: none; marker-end: url(#arrow); }
      .muted { fill: #f4f6f8; }
      .file { fill: #d8ecff; }
      .vfs { fill: #fff0a8; }
      .cache { fill: #c9f2d0; }
      .sb { fill: #ffd7d7; }
      .fs { fill: #ffe2b7; }
      .dev { fill: #e6f4ee; }
      .title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        font-weight: 700;
        fill: #1f2937;
      }
      .cardTitle {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        font-weight: 700;
        fill: #1f2937;
      }
      .text {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
        fill: #1f2937;
      }
      .small {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 12px;
        fill: #374151;
      }
      .side {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        font-weight: 700;
        fill: #374151;
      }
      .caption {
        font-family: Arial, "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 20px;
        font-weight: 700;
        fill: #111827;
      }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1400" height="900"/>
  <rect class="outer" x="34" y="24" width="1332" height="838" rx="18"/>

  <text class="title" x="700" y="58" text-anchor="middle">Kairix File System Overview</text>

  <!-- FD layer -->
  <text class="side" x="165" y="125" text-anchor="end">Process</text>
  <rect class="box muted" x="215" y="96" width="970" height="72" rx="14"/>
  <text class="title" x="700" y="124" text-anchor="middle">ProcessControlBlock.fd_table</text>
  <rect class="subbox" x="330" y="140" width="130" height="24" rx="5" fill="#ffffff"/>
  <text class="small" x="395" y="156" text-anchor="middle">fd -&gt; File</text>
  <rect class="subbox" x="500" y="140" width="130" height="24" rx="5" fill="#ffffff"/>
  <text class="small" x="565" y="156" text-anchor="middle">stdin/out/err</text>
  <rect class="subbox" x="670" y="140" width="130" height="24" rx="5" fill="#ffffff"/>
  <text class="small" x="735" y="156" text-anchor="middle">opened files</text>
  <rect class="subbox" x="840" y="140" width="130" height="24" rx="5" fill="#ffffff"/>
  <text class="small" x="905" y="156" text-anchor="middle">pipe/socket</text>

  <line class="dash" x1="60" y1="200" x2="1320" y2="200"/>
  <text class="small" x="700" y="220" text-anchor="middle">syscalls: openat / read / write / mmap / mount / sync</text>
  <path class="arrow" d="M700 168 L700 258"/>

  <!-- File layer -->
  <text class="side" x="165" y="290" text-anchor="end">File</text>
  <rect class="box file" x="215" y="258" width="970" height="70" rx="12"/>
  <text class="title" x="700" y="286" text-anchor="middle">Arc&lt;dyn File&gt;</text>
  <rect class="subbox" x="330" y="300" width="140" height="24" rx="5" fill="#edf7ff"/>
  <text class="small" x="400" y="316" text-anchor="middle">Ext4File</text>
  <rect class="subbox" x="510" y="300" width="140" height="24" rx="5" fill="#edf7ff"/>
  <text class="small" x="580" y="316" text-anchor="middle">TempFile</text>
  <rect class="subbox" x="690" y="300" width="140" height="24" rx="5" fill="#edf7ff"/>
  <text class="small" x="760" y="316" text-anchor="middle">DeviceFile</text>
  <rect class="subbox" x="870" y="300" width="160" height="24" rx="5" fill="#edf7ff"/>
  <text class="small" x="950" y="316" text-anchor="middle">Proc/Sysfs/Pipe</text>

  <path class="arrow" d="M700 328 L700 395"/>

  <!-- Core filesystem objects -->
  <text class="side" x="165" y="460" text-anchor="end">Core Objects</text>
  <rect class="box" x="190" y="395" width="1150" height="150" rx="18" fill="#fbfcfe"/>

  <rect class="box vfs" x="245" y="430" width="210" height="78" rx="12"/>
  <text class="cardTitle" x="350" y="460" text-anchor="middle">Dentry</text>
  <text class="small" x="350" y="485" text-anchor="middle">path tree node</text>

  <rect class="box cache" x="505" y="430" width="210" height="78" rx="12"/>
  <text class="cardTitle" x="610" y="460" text-anchor="middle">GLOBAL_DCACHE</text>
  <text class="small" x="610" y="485" text-anchor="middle">path cache</text>

  <rect class="box vfs" x="765" y="430" width="210" height="78" rx="12"/>
  <text class="cardTitle" x="870" y="460" text-anchor="middle">Inode</text>
  <text class="small" x="870" y="485" text-anchor="middle">metadata + ops</text>

  <rect class="box cache" x="1025" y="430" width="240" height="78" rx="12"/>
  <text class="cardTitle" x="1145" y="460" text-anchor="middle">PAGE_CACHE</text>
  <text class="small" x="1145" y="485" text-anchor="middle">cached pages + writeback</text>

  <path class="arrow" d="M455 469 L505 469"/>
  <path class="arrow" d="M715 469 L765 469"/>
  <path class="arrow" d="M975 469 L1025 469"/>
  <path class="arrow" d="M870 508 L870 610"/>

  <!-- Superblock layer -->
  <text class="side" x="165" y="650" text-anchor="end">Mounts</text>
  <rect class="box sb" x="215" y="610" width="970" height="92" rx="14"/>
  <text class="title" x="700" y="640" text-anchor="middle">Mounted SuperBlocks</text>
  <rect class="subbox" x="285" y="664" width="125" height="24" rx="5" fill="#fff1f1"/>
  <text class="small" x="347.5" y="680" text-anchor="middle">ext4 /</text>
  <rect class="subbox" x="445" y="664" width="125" height="24" rx="5" fill="#fff1f1"/>
  <text class="small" x="507.5" y="680" text-anchor="middle">devfs /dev</text>
  <rect class="subbox" x="605" y="664" width="125" height="24" rx="5" fill="#fff1f1"/>
  <text class="small" x="667.5" y="680" text-anchor="middle">tmpfs</text>
  <rect class="subbox" x="765" y="664" width="125" height="24" rx="5" fill="#fff1f1"/>
  <text class="small" x="827.5" y="680" text-anchor="middle">procfs</text>
  <rect class="subbox" x="925" y="664" width="125" height="24" rx="5" fill="#fff1f1"/>
  <text class="small" x="987.5" y="680" text-anchor="middle">sysfs</text>

  <path class="arrow" d="M700 702 L700 760"/>

  <!-- Fs type layer -->
  <text class="side" x="165" y="798" text-anchor="end">FsType</text>
  <rect class="box fs" x="215" y="760" width="970" height="70" rx="14"/>
  <text class="title" x="700" y="788" text-anchor="middle">FS_MANAGER</text>
  <rect class="subbox" x="340" y="802" width="120" height="24" rx="5" fill="#fff3df"/>
  <text class="small" x="400" y="818" text-anchor="middle">ext4/ext2/3</text>
  <rect class="subbox" x="500" y="802" width="100" height="24" rx="5" fill="#fff3df"/>
  <text class="small" x="550" y="818" text-anchor="middle">fat32</text>
  <rect class="subbox" x="640" y="802" width="100" height="24" rx="5" fill="#fff3df"/>
  <text class="small" x="690" y="818" text-anchor="middle">devfs</text>
  <rect class="subbox" x="780" y="802" width="100" height="24" rx="5" fill="#fff3df"/>
  <text class="small" x="830" y="818" text-anchor="middle">proc/tmp</text>
  <rect class="subbox" x="920" y="802" width="100" height="24" rx="5" fill="#fff3df"/>
  <text class="small" x="970" y="818" text-anchor="middle">sysfs</text>

  <text class="caption" x="700" y="875" text-anchor="middle">图 4-1：Kairix 文件系统总览</text>
</svg>
